services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: top-video-generator:dev
    environment:
      TOP_MUSIC_ENV: development
      OAUTHLIB_INSECURE_TRANSPORT: "1"
      TOP_MUSIC_ADMIN_PASSWORD: ${TOP_MUSIC_ADMIN_PASSWORD:-}
    volumes:
      - ./src:/app/src:ro
      - ./src/resources:/app/resources:ro

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: top-video-generator:dev
    environment:
      TOP_MUSIC_ENV: development
      OAUTHLIB_INSECURE_TRANSPORT: "1"

  top-video-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: top-video-generator:dev
    environment:
      TOP_MUSIC_ENV: development
      OAUTHLIB_INSECURE_TRANSPORT: "1"
