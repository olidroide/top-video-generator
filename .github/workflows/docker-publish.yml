name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Build and Publish Multi-Arch Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDDHHmm' tz='UTC'}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha
          labels: |
            org.opencontainers.image.title=top-video-generator
            org.opencontainers.image.description=Automated trending music video pipeline
            org.opencontainers.image.vendor=olidroide
          annotations: |
            org.opencontainers.image.description=Automated trending music video pipeline
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=top-video-generator-release
          cache-to: type=gha,scope=top-video-generator-release,mode=max

      - name: Build summary
        run: |
          {
            echo "## Published image"
            echo ""
            echo "- Image: ghcr.io/${{ github.repository }}"
            echo "- Tags:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
            echo "- Digest: ${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"

  release-notes:
    name: Publish Release Notes
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Create GitHub Release with generated notes
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = context.ref.replace('refs/tags/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const body = [
              'Container image published to GHCR.',
              '',
              `- Image: ghcr.io/${owner}/${repo}`,
              `- Tag: ${tagName}`,
              `- Also available as: latest (when published from default branch)`
            ].join('\n');

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag: tagName });
              core.info(`Release for ${tagName} already exists; skipping.`);
            } catch (error) {
              if (error.status !== 404) throw error;

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: tagName,
                body,
                generate_release_notes: true,
                make_latest: 'legacy',
              });
            }
