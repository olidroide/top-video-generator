name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Build and Publish Multi-Arch Image
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDDHHmm' tz='UTC'}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha
          labels: |
            org.opencontainers.image.title=top-video-generator
            org.opencontainers.image.description=Automated trending music video pipeline
            org.opencontainers.image.vendor=olidroide
          annotations: |
            org.opencontainers.image.description=Automated trending music video pipeline
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=top-video-generator-release
          cache-to: type=gha,scope=top-video-generator-release,mode=max

      - name: Build summary
        run: |
          {
            echo "## Published image"
            echo ""
            echo "- Image: ghcr.io/${{ github.repository }}"
            echo "- Tags:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
            echo "- Digest: ${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"

  release-notes:
    name: Publish Release Notes
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Create GitHub Release with generated notes
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isTag = context.ref.startsWith('refs/tags/');
            const refName = isTag ? context.ref.replace('refs/tags/', '') : context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const body = [
              'Container image published to GHCR.',
              '',
              `- Image: ghcr.io/${owner}/${repo}`,
              `- Ref: ${refName}`,
              `- Also available as: latest (when published from default branch)`
            ].join('\n');

            if (isTag) {
              try {
                await github.rest.repos.getReleaseByTag({ owner, repo, tag: refName });
                core.info(`Release for ${refName} already exists; skipping.`);
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: refName,
                  name: refName,
                  body,
                  generate_release_notes: true,
                  make_latest: 'legacy',
                });
              }
            } else {
              core.info(`Skipping GitHub release — not a tag push (${refName}).`);
            }
