name: CI

on:
  push:
    branches: [main, vibes]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Format · Lint · Type · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (ty)
        run: uv run ty check src/ tests/

      - name: Tests
        run: uv run pytest tests/ -x -q --ignore=tests/integration/video
        env:
          TOP_MUSIC_ENV: development

  slow-tests:
    name: Media Pipeline Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install system dependencies
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --fix-missing ffmpeg imagemagick || (
            sudo apt-get update -o Acquire::Retries=3 &&
            sudo apt-get install -y --fix-missing ffmpeg imagemagick
          )

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Media pipeline tests
        run: uv run pytest tests/integration/video -x -q -m slow
        env:
          TOP_MUSIC_ENV: development
