default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        stages: [pre-commit]
        files: ^(src|tests)/.*\.py$
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        stages: [pre-commit]
        files: ^(src|tests)/.*\.py$
        types_or: [python, pyi]
      - id: quality-gate
        name: make quality
        entry: make quality
        language: system
        stages: [pre-push]
        pass_filenames: false
      - id: pytest-gate
        name: pytest gate
        entry: uv run pytest tests/ -x -q --ignore=tests/integration/video
        language: system
        stages: [pre-commit, pre-push]
        pass_filenames: false
