# Pre-commit hook config. Compatible with both `prek` and `pre-commit`.
#
# Scope: keep commit-time checks fast and mostly file-scoped.
# Heavy gates are still enforced by project make targets and CI.

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        stages: [pre-commit]
        files: ^(src|tests)/.*\.(py|pyi)$
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        stages: [pre-commit]
        files: ^(src|tests)/.*\.(py|pyi)$
        types_or: [python, pyi]
        require_serial: true
      - id: quality-gate
        name: make quality
        entry: make quality
        language: system
        stages: [pre-push]
        pass_filenames: false
      - id: pytest-gate
        name: pytest gate
        entry: make test
        language: system
        stages: [pre-push]
        pass_filenames: false
