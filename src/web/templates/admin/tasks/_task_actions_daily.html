<button
  class="n-btn"
  hx-post="/admin/tasks/daily/trigger"
  hx-target="#tasks-feedback"
  hx-swap="outerHTML"
  hx-confirm="This task can take several minutes. Continue?"
  title="Manually trigger daily vertical publish"
  aria-label="Trigger daily task"
>
  {{ task.action_label }}
  <span class="htmx-indicator" aria-hidden="true">
    <i class="fas fa-circle-notch n-spin"></i>
  </span>
</button>
<button
  class="n-btn n-btn--outline"
  hx-post="/admin/tasks/daily/trigger?publisher=instagram"
  hx-target="#tasks-feedback"
  hx-swap="outerHTML"
  hx-confirm="This will retry Daily Vertical for Instagram only. Continue?"
  title="Manually trigger daily vertical publish for Instagram"
  aria-label="Trigger daily task for Instagram"
>
  Trigger Instagram
  <span class="htmx-indicator" aria-hidden="true">
    <i class="fas fa-circle-notch n-spin"></i>
  </span>
</button>
<p class="task-value task-value--muted">
  <span class="task-source-note">Instagram only</span>
</p>
{% if task.is_running %}
  <button
    class="n-btn n-btn--outline"
    hx-get="/admin/tasks/logs/daily"
    hx-target="#task-logs-daily-vertical"
    hx-swap="innerHTML"
    title="View live task logs"
    aria-label="View task logs"
  >
    <i class="fas fa-file-alt" aria-hidden="true"></i> View Logs
    <span class="htmx-indicator" aria-hidden="true">
      <i class="fas fa-circle-notch n-spin"></i>
    </span>
  </button>
{% endif %}
<button
  class="n-btn n-btn--outline"
  hx-get="/admin/verify"
  hx-target="#verification-results-container"
  hx-swap="innerHTML"
  hx-disabled-elt="this"
  title="Verify latest published videos are live"
  aria-label="Verify published videos"
>
  <i class="fas fa-check-circle refresh-action__icon" aria-hidden="true"></i> Verify Published
  <span class="htmx-indicator" aria-hidden="true">
    <i class="fas fa-circle-notch n-spin"></i>
  </span>
</button>
