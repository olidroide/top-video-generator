<div
  id="tasks-feedback"
  aria-live="polite"
  aria-atomic="true"
  role="status"
  class="n-task-feedback n-task-feedback--requested"
  hx-get="/admin/tasks/status"
  hx-trigger="every 3s"
  hx-target="#tasks-grid"
  hx-swap="outerHTML"
>
  <strong>Requested:</strong> {{ message }}
  <em class="n-task-feedback__hint">
    Monitoring execution - task grid will auto-refresh...
  </em>
</div>
