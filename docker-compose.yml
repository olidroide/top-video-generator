x-top-video-generator-common: &top-video-generator-common
  image: ${TOP_VIDEO_GENERATOR_IMAGE:-ghcr.io/olidroide/top-video-generator:latest}
  pull_policy: ${TOP_VIDEO_GENERATOR_PULL_POLICY:-missing}
  init: true
  restart: unless-stopped
  stop_grace_period: 90s
  env_file:
    - path: ./.env
      required: true
    - path: ./.env.local
      required: false
  volumes:
    - ./prod:/app/db
    - ./prod/videos:/app/videos
    - ./prod/logs:/app/logs
    - ./secrets:/app/secrets:ro
  tmpfs:
    - /app/run:mode=1777

services:
  web:
    <<: *top-video-generator-common
    environment:
      STEP: web
    ports:
      - "${TOP_VIDEO_GENERATOR_PORT:-8080}:8080"
    mem_limit: 768m
    memswap_limit: 768m
    cpus: 1.0
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  scheduler:
    <<: *top-video-generator-common
    environment:
      STEP: scheduler
    mem_limit: 2500m
    memswap_limit: 2500m
    cpus: 2.0
    healthcheck:
      test: ["CMD", "python", "-m", "src.entrypoints.scheduler_healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  top-video-generator:
    <<: *top-video-generator-common
    profiles: ["manual"]
    restart: "no"
